kind = "web"
previewPath = "/"
title = "XRPL Flow"
version = "1.0.0"
id = "artifacts/xrpl-flow"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23287

[services.development]
run = "pnpm --filter @workspace/xrpl-flow run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/xrpl-flow", "run", "build" ]
publicDir = "artifacts/xrpl-flow/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23287"
BASE_PATH = "/"
